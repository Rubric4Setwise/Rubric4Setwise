# Rankify reranker configuration
# Set ranker_preset to enable automatic reranking after search.
# Available presets:
#   Ranking: bge-reranker-large, rankllama, monot5, rankvicuna, rankzephyr,
#            rankgpt, rankt5, rankr1-7b, rank1-7b, rearank-7b, reasonrank-7b, setwise-sft-7b
#   Set Selection: setr, rank4gen, rubric4setwise, rubric4setwise-llama8b
#                  (these select a relevant subset, top_n is ignored)
# Set to null/empty to disable reranking.
ranker_preset: null
ranker_top_n: -1        # -1 = return all ranked results; set e.g. 5 to keep top 5
ranker_timeout: 1200     # Timeout in seconds (some rankers are slow)

